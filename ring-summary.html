<!DOCTYPE html>
<html>
<head>
    <style>
        /* Modern Industrial Dark Theme */
        :root {
            --bg-main: #1a1c23;
            --bg-card: #24262d;
            --sidebar-bg: #121317;
            --accent-color: #e67e22; /* Textile Orange */
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-muted: #3f4451;
            --table-header: #2d313a;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg-main); 
            color: var(--text-main);
        }

        #mainAppWrapper { display: flex; height: 100vh; }

        /* Sidebar Customization */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            padding: 25px; 
            display: flex; 
            flex-direction: column;
            border-right: 1px solid var(--border-muted);
        }

        .nav-btn { 
            background: #2d313a; 
            color: var(--text-main); 
            border: 1px solid var(--border-muted); 
            padding: 12px 15px; 
            margin-bottom: 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none; /* Added for link support */
            display: block; /* Added for link support */
        }

        .nav-btn:hover { background: var(--accent-color); border-color: var(--accent-color); color: white; }

        /* Dashboard Container */
        #contentArea { flex: 1; overflow-y: auto; padding: 25px; }

        .container { 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }

        h2 { color: var(--accent-color); margin-top: 0; letter-spacing: 1px; }

        /* Controls Section */
        .header-controls { 
            display: flex; 
            gap: 12px; 
            background: #2d313a; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            align-items: flex-end; 
            flex-wrap: wrap;
            border: 1px solid var(--border-muted);
        }

        .control-field label { color: var(--accent-color); margin-bottom: 5px; display: block; }

        input, select {
            background: #1a1c23;
            border: 1px solid var(--border-muted);
            color: white;
            padding: 8px 10px;
            border-radius: 4px;
        }

        /* Buttons */
        .btn-fetch { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-export { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 5px;}
        .btn-pdf { background: #c0392b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 5px;}
        .btn-toggle { background: #5d6d7e; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        /* Table Styling */
        .table-container { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid var(--border-muted); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; background: #24262d; }
        th { background: var(--table-header); color: var(--accent-color); padding: 12px 5px; border: 1px solid var(--border-muted); text-transform: uppercase; font-size: 10px; }
        td { padding: 10px 5px; border: 1px solid var(--border-muted); text-align: center; color: #cbd5e1; }
        
        tr:nth-child(even) { background: #2d313a; }
        tr:hover { background: #34495e; }

        .pos-val { color: #2ecc71; font-weight: bold; }
        .neg-val { color: #e74c3c; font-weight: bold; }
        .total-row { background: var(--sidebar-bg) !important; color: var(--accent-color) !important; font-weight: bold; }

        .column-picker { background: #2d313a; padding: 15px; border: 1px solid var(--border-muted); border-radius: 8px; margin-bottom: 15px; display: none; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

        /* Print Media Settings - FIXED FOR FITTING DATA */
        @media print {
            @page { size: landscape; margin: 5mm; }
            body { background: white; color: black; zoom: 70%; } /* Shrinks content to fit */
            .sidebar, .header-controls, .btn-toggle, .column-picker { display: none !important; }
            #contentArea { padding: 0; width: 100%; }
            #mainAppWrapper { display: block; }
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
            table { font-size: 10px; color: black; border: 1px solid #000; width: 100%; table-layout: auto; }
            th { background: #eee !important; color: black !important; border: 1px solid #000; }
            td { border: 1px solid #000; color: black !important; }
            .total-row { background: #ddd !important; color: black !important; }
        }
    </style>
</head>
<body>

<div id="mainAppWrapper">
    <div class="sidebar">
        <h3 style="color:var(--accent-color); text-align:center;">CEDAAR TEXTILE</h3>
        <a href="index.html" class="nav-btn">🏠 Return to Home</a>
        <button class="nav-btn">📊 Ring Summary</button>
        <div style="margin-top: auto; font-size: 10px; color: #64748b; text-align: center;">v2.0.34</div>
    </div>

    <div id="contentArea">
        <div class="container" id="printableReport">
            <h2>Ring Production Summary</h2>
            <div class="header-controls">
                <div class="control-field"><label>Date</label><input type="date" id="reportDate"></div>
                <div class="control-field">
                    <label>Shift</label>
                    <select id="reportShift">
                        <option value="ALL">All Shifts</option>
                        <option value="A">Shift A</option>
                        <option value="B">Shift B</option>
                        <option value="C">Shift C</option>
                    </select>
                </div>
                <button class="btn-fetch" onclick="generateRingSummary()">GENERATE</button>
                <button class="btn-toggle" onclick="toggleColumnPicker()">⚙️ COLUMNS</button>
                <button class="btn-pdf" onclick="window.print()">📄 PDF</button>
                <button class="btn-export" onclick="exportToExcel()">Excel</button>
            </div>

            <div id="colPicker" class="column-picker"></div>
            
            <div class="table-container">
                <table id="summaryTable">
                    <thead>
                        <tr id="tableHeaderRow">
                            <th data-col="0">Article</th><th data-col="1">Count</th><th data-col="2">Actual Spindle</th>
                            <th data-col="3">Idol Spindle</th><th data-col="4">Work Spindle</th><th data-col="5">Shd. Grms.</th>
                            <th data-col="6">Actual Grms.</th><th data-col="7">Shd. Prod.</th><th data-col="8">Actual Prod.</th>
                            <th data-col="9">Prod. Gap</th><th data-col="10">Shd. Speed</th><th data-col="11">Machine Speed</th>
                            <th data-col="12">Machine TPI</th><th data-col="13">Utilization</th><th data-col="14">Prd. Effi%</th>
                            <th data-col="15">Speed Loss%</th><th data-col="16">Utili Loss%</th><th data-col="17">Idol Loss%</th>
                            <th data-col="18">Total Effi%</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody">
                        <tr><td colspan="19" style="padding:40px;">No data loaded.</td></tr>
                    </tbody>
                    <tfoot id="summaryTableFoot"></tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';

    const headerRow = document.getElementById('tableHeaderRow');
    const picker = document.getElementById('colPicker');
    Array.from(headerRow.cells).forEach((cell, index) => {
        const label = document.createElement('label');
        label.style.color = "white";
        label.style.fontSize = "11px";
        label.innerHTML = `<input type="checkbox" checked onchange="toggleCol(${index})" data-index="${index}"> ${cell.innerText}`;
        picker.appendChild(label);
    });

    function toggleColumnPicker() { picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid'; }

    function toggleCol(index) {
        const show = document.querySelector(`input[data-index="${index}"]`).checked;
        const cells = document.querySelectorAll(`[data-col="${index}"]`);
        cells.forEach(c => c.style.display = show ? '' : 'none');
        const rows = document.getElementById('summaryTableBody').rows;
        for(let r=0; r<rows.length; r++) { if(rows[r].cells[index]) rows[r].cells[index].style.display = show ? '' : 'none'; }
        const footRow = document.getElementById('summaryTableFoot').rows[0];
        if(footRow && footRow.cells[index]) footRow.cells[index].style.display = show ? '' : 'none';
    }

    function exportToExcel() {
        let table = document.getElementById("summaryTable");
        let rows = Array.from(table.rows);
        let csvContent = "data:text/csv;charset=utf-8,";

        rows.forEach(row => {
            let rowData = Array.from(row.cells)
                .filter(cell => cell.style.display !== 'none') 
                .map(cell => `"${cell.innerText.replace(/%/g, '')}"`)
                .join(",");
            csvContent += rowData + "\r\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Ring_Report_${document.getElementById('reportDate').value}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function generateRingSummary() {
        const reportDate = document.getElementById('reportDate').value;
        const reportShift = document.getElementById('reportShift').value;
        const tbody = document.getElementById('summaryTableBody');
        const tfoot = document.getElementById('summaryTableFoot');
        
        if (!reportDate) return alert("Select a date.");
        tbody.innerHTML = '<tr><td colspan="19">Fetching production data...</td></tr>';
        tfoot.innerHTML = "";

        try {
            const response = await fetch(`${API_URL}?Department=RING`); 
            const allData = await response.json();

            const filtered = allData.filter(row => {
                if(!row.Date) return false;
                const d = new Date(row.Date);
                const rowDateClean = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                const rowShift = (row["Production Shift"] || "").toString().toUpperCase();
                const targetShift = reportShift.toUpperCase();
                const shiftMatch = (targetShift === "ALL") ? true : rowShift.includes(targetShift);
                return rowDateClean === reportDate && shiftMatch;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="19">No entries found for this date.</td></tr>';
                return;
            }

            const grouped = filtered.reduce((acc, row) => {
                const art = row.Article || "Unknown";
                if (!acc[art]) {
                    acc[art] = { countSum: 0, actSpdl: 0, idolSpdl: 0, actProd: 0, shdGrmSum: 0, shdSpeedSum: 0, mSpeedSum: 0, mTpiSum: 0, detMinSum: 0, availMinSum: 0, rows: 0 };
                }
                acc[art].actSpdl += parseFloat(row["Number of Spindles"] || 0);
                acc[art].idolSpdl += parseFloat(row["Idol Spindles"] || 0);
                acc[art].actProd += parseFloat(row["Actual Production"] || 0);
                acc[art].detMinSum += parseFloat(row["Detention Minutes"] || 0);
                acc[art].availMinSum += parseFloat(row["Avail Minutes"] || 0);
                acc[art].countSum += parseFloat(row["Count"] || 0);
                acc[art].shdGrmSum += parseFloat(row["SHD. GRM."] || 0);
                acc[art].shdSpeedSum += parseFloat(row["SHD. SPEED"] || 0);
                acc[art].mSpeedSum += parseFloat(row["Machine Speed"] || 0);
                acc[art].mTpiSum += parseFloat(row["Machine TPI"] || 0);
                acc[art].rows++;
                return acc;
            }, {});

            tbody.innerHTML = "";
            let grand = { count:[], actS:0, idolS:0, workS:0, sGrm:[], aGrm:[], sPrd:0, aPrd:0, gap:0, sSpd:[], mSpd:[], mTpi:[], util:[], pEff:[], sLos:[], uLos:[], iLos:[], tEff:[], artCount:0 };

            for (const article in grouped) {
                const data = grouped[article];
                const avgCount = data.countSum / data.rows;
                const avgShdGrm = data.shdGrmSum / data.rows;
                const avgShdSpeed = data.shdSpeedSum / data.rows;
                const avgMSpeed = data.mSpeedSum / data.rows;
                const avgMTpi = data.mTpiSum / data.rows;
                const shdProd = (avgShdGrm * data.actSpdl) / 1000;
                const prodGap = shdProd - data.actProd;
                const prdEffi = shdProd > 0 ? (data.actProd / shdProd) * 100 : 0;
                const utiliLoss = data.availMinSum > 0 ? (data.detMinSum / data.availMinSum) * 100 : 0;
                const utilization = 100 - utiliLoss;
                const workSpindles = (data.actSpdl * utilization) / 100;
                const speedLoss = avgShdSpeed > 0 ? ((avgShdSpeed - avgMSpeed) / avgShdSpeed) * 100 : 0;
                const idolLoss = data.actSpdl > 0 ? (data.idolSpdl / data.actSpdl) * 100 : 0;
                const actualGrms = workSpindles > 0 ? (data.actProd / workSpindles) * 1000 : 0;
                let totalEffi = 0;
                [prdEffi, speedLoss, utiliLoss, idolLoss].forEach(v => { if(v > 0) totalEffi += v; });

                grand.count.push(avgCount); grand.actS += data.actSpdl; grand.idolS += data.idolSpdl; 
                grand.workS += workSpindles; grand.sGrm.push(avgShdGrm); grand.aGrm.push(actualGrms);
                grand.sPrd += shdProd; grand.aPrd += data.actProd; grand.gap += prodGap;
                grand.sSpd.push(avgShdSpeed); grand.mSpd.push(avgMSpeed); grand.mTpi.push(avgMTpi);
                grand.util.push(utilization); grand.pEff.push(prdEffi); grand.sLos.push(speedLoss);
                grand.uLos.push(utiliLoss); grand.iLos.push(idolLoss); grand.tEff.push(totalEffi);
                grand.artCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${article}</td><td>${avgCount.toFixed(2)}</td><td>${data.actSpdl.toFixed(0)}</td><td>${data.idolSpdl.toFixed(0)}</td><td>${workSpindles.toFixed(0)}</td><td>${avgShdGrm.toFixed(2)}</td><td>${actualGrms.toFixed(2)}</td><td>${shdProd.toFixed(2)}</td><td style="background:#2d3a31;">${data.actProd.toFixed(2)}</td><td class="${prodGap <= 0 ? 'pos-val' : 'neg-val'}">${prodGap.toFixed(2)}</td><td>${avgShdSpeed.toFixed(0)}</td><td>${avgMSpeed.toFixed(0)}</td><td>${avgMTpi.toFixed(2)}</td><td>${utilization.toFixed(2)}%</td><td>${prdEffi.toFixed(2)}%</td><td>${speedLoss.toFixed(2)}%</td><td>${utiliLoss.toFixed(2)}%</td><td>${idolLoss.toFixed(2)}%</td><td style="font-weight:bold; background:#3e2b1c;">${totalEffi.toFixed(2)}%</td>`;
                tbody.appendChild(tr);
            }

            const getAvg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0) / arr.length).toFixed(2) : "0.00";
            const tf = document.createElement('tr');
            tf.className = "total-row";
            tf.innerHTML = `
                <td>GRAND TOTAL</td><td>${getAvg(grand.count)}</td><td>${grand.actS.toFixed(0)}</td><td>${grand.idolS.toFixed(0)}</td><td>${grand.workS.toFixed(0)}</td><td>${getAvg(grand.sGrm)}</td><td>${getAvg(grand.aGrm)}</td><td>${grand.sPrd.toFixed(2)}</td><td>${grand.aPrd.toFixed(2)}</td><td>${grand.gap.toFixed(2)}</td><td>${getAvg(grand.sSpd)}</td><td>${getAvg(grand.mSpd)}</td><td>${getAvg(grand.mTpi)}</td><td>${getAvg(grand.util)}%</td><td>${getAvg(grand.pEff)}%</td><td>${getAvg(grand.sLos)}%</td><td>${getAvg(grand.uLos)}%</td><td>${getAvg(grand.iLos)}%</td><td>${getAvg(grand.tEff)}%</td>
            `;
            tfoot.appendChild(tf);
            picker.querySelectorAll('input').forEach(input => toggleCol(input.dataset.index));
        } catch (e) { tbody.innerHTML = '<tr><td colspan="19" style="color:red;">Error connecting to CEDAAR database.</td></tr>'; }
    }
</script>
</body>
</html>
