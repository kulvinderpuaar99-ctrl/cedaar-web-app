<!DOCTYPE html>
<html>
<head>
    <style>
        /* --- ALL ORIGINAL STYLES UNCHANGED --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        .login-card h2 { margin-top: 0; color: #2c3e50; border: none; padding: 0; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .login-btn:hover { background: #d35400; }
        
        #mainAppWrapper { display: none; }
        #dashboard { display: flex; height: 100vh; background-image: url('Gemini_Generated_Image_pvg3hepvg3hepvg3.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; }
        .sidebar { width: 300px; background: rgba(44, 62, 80, 0.9); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.5); z-index: 2; }
        .logo-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .company-title-card { background: rgba(255, 255, 255, 0.85); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); backdrop-filter: blur(5px); }
        .company-name { font-size: 36px; font-weight: bold; color: #1a252f; margin: 0; }
        .menu-title { font-size: 14px; color: #bdc3c7; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; }
        .nav-btn { background: #34495e; color: white; border: none; padding: 15px; margin-bottom: 12px; border-radius: 8px; text-align: left; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s ease; }
        .nav-btn:hover { background: #e67e22; transform: translateX(8px); }
        #productionApp { display: none; padding: 10px; flex: 1; overflow-y: auto; background: #f0f4f8; height: 100vh; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); max-width: 100%; margin: 0 auto; }
        h2 { color: #2c3e50; border-left: 5px solid #e67e22; padding-left: 15px; margin-bottom: 10px; font-size: 20px; }
        .header-controls { display: flex; gap: 10px; background: #fff3e0; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffe0b2; align-items: flex-end; flex-wrap: wrap; }
        .control-field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; color: #636e72; margin-bottom: 3px; text-transform: uppercase; }
        .btn-fetch { background: #d35400; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; height: 32px; transition: 0.3s; }
        .btn-fetch:hover { background: #e67e22; }
        .btn-refresh { background: #2980b9; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; height: 32px; transition: 0.3s; }
        .btn-refresh:hover { background: #3498db; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { color: white; padding: 6px 2px; position: sticky; top: 0; z-index: 10; white-space: nowrap; }
        td { padding: 2px; border: 1px solid #dee2e6; text-align: center; }
        input, select { width: 92%; padding: 4px; border: 1px solid #ced4da; border-radius: 3px; font-size: 10px; }
        .mc-label { font-weight: bold; color: #2c3e50; background: #f1f2f6; width: 60px; }
        .prod-output { background: #e8f5e9 !important; border: none; text-align: center; font-weight: bold; color: #2e7d32; pointer-events: none; }
        .prev-booked-box { background: #fce4ec; color: #c2185b; font-weight: bold; border: none; text-align: center; }
        .info-box { background: #e3f2fd; color: #1565c0; border: none; text-align: center; font-weight: bold; }
        .placeholder-msg { text-align: center; padding: 40px; color: #95a5a6; font-style: italic; }
        
        /* MODAL STYLES */
        #detentionModal, #chemModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 10px; width: 320px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        .footer { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 2px solid #eee; text-align: right; margin-top: 15px; display: none; }
        .btn-submit { background: #27ae60; color: white; padding: 10px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-row-submit { background: #2980b9; color: white; border: none; border-radius: 3px; padding: 4px 8px; cursor: pointer; font-size: 9px; font-weight: bold; }
        .back-btn { background:#2c3e50; border:none; color:white; padding: 8px 15px; border-radius: 5px; cursor:pointer; font-weight:bold; margin-bottom:10px; }
        .btn-add-row { background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* New Modal Row Styling */
        .chem-input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .chem-input-row input { flex: 1; }
    </style>
</head>
<body>
    
 <nav style="background-color: #000000; padding: 15px 0; text-align: left; font-family: 'Segoe UI', Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
  <a href="index.html" style="color: #ffffff; text-decoration: none; margin: 0 15px; font-weight: 500; font-size: 16px;">Home🏠</a>
</nav>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: #e67e22;">CEDAAR LOGIN</h2>
        <input type="text" id="userInp" class="login-input" placeholder="Username">
        <input type="password" id="passInp" class="login-input" placeholder="Password">
        <button onclick="checkLogin()" class="login-btn">LOGIN</button>
        <p id="loginError" style="color: red; font-size: 11px; margin-top: 10px; display: none;">Invalid Username or Password.</p>
    </div>
</div>

<div id="mainAppWrapper">
    <div id="dashboard">
        <div class="sidebar">
            <div class="menu-title">Main Menu</div>
            <div id="activeUserInfo" style="font-size: 11px; color: #e67e22; margin-bottom: 10px; font-weight: bold;"></div>
            <button class="nav-btn" onclick="showApp('production')"> 📋Production Booking</button>
            <button class="nav-btn" onclick="showDispatch()"> 🚚Dispatch</button>
            <button class="nav-btn" onclick="location.reload()" style="background: #c0392b; margin-top: 20px;"> Logout</button>
            <div style="margin-top: auto; font-size: 11px; text-align: center; color: #ecf0f1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
                <strong>Cedaar Textile Limited</strong><br>v2.0.28
            </div>
        </div>
        <div class="logo-area">
            <div class="company-title-card">
                <h1 class="company-name">CEDAAR TEXTILE LIMITED</h1>
            </div>
        </div>
    </div>

    <div id="productionApp">
        <button onclick="goBack()" class="back-btn">⬅ Return to Dashboard</button>
        <div class="container">
            <h2 id="appTitle">Production Booking</h2>
            <div class="header-controls">
                <div class="control-field"><label>Date</label><input type="date" id="batchDate"></div>
                <div class="control-field" id="shiftFieldContainer"><label>Shift</label>
                    <select id="batchShift"><option value="">-- Select Shift --</option><option value="A">Shift A</option><option value="B">Shift B</option><option value="C">Shift C</option></select>
                </div>
                <div class="control-field"><label>Department</label>
                    <select id="formType" onchange="handleDeptChange()">
                        <option value="">-- Select Department --</option>
                        <optgroup label="Production" id="prodGroup">
                            <option value="PACKING">Packing</option>
                            <option value="DYING">Dying M/c</option>
                        </optgroup>
                        <optgroup label="Sales" id="saleGroup" style="display:none;"><option value="SALE">Dispatch (Sale)</option></optgroup>
                    </select>
                </div>
                <button class="btn-fetch" onclick="fetchExistingProduction()">🔍 FETCH DATA</button>
                <button class="btn-refresh" onclick="renderTable()">🔄 REFRESH TABLE</button>
            </div>
            <div id="welcomeMsg" class="placeholder-msg">Select a department and click "Fetch".</div>
            <table id="productionTable" style="display:none;">
                <thead><tr id="tableHeaderRow"></tr></thead>
                <tbody id="machineTableBody"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="100%" style="text-align: left; padding: 10px;">
                            <button type="button" class="btn-add-row" onclick="addNewRow()">+ ADD NEW ROW / LOT</button>
                        </td>
                    </tr>
                </tfoot>
            </table>
            <div class="footer" id="formFooter"><button type="button" class="btn-submit" onclick="submitAllData()">SUBMIT ALL MACHINE DATA</button></div>
        </div>
    </div>
</div>

<div id="detentionModal"><div class="modal-content"><h3 id="modalTitle" style="color:#e67e22; margin-top:0;">Detention Selection</h3><div id="detentionOptions"></div><div style="text-align:right; margin-top:15px;"><button onclick="closeModal()" style="background:#2980b9; color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">DONE</button></div></div></div>

<div id="chemModal"><div class="modal-content"><h3 id="chemModalTitle" style="color:#8e44ad; margin-top:0;">Manual Entry</h3>
    <div id="chemEntriesContainer"></div>
    <button onclick="addChemRow()" style="background:#8e44ad; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-top:10px; font-size:10px;">+ Add Entry</button>
    <div style="text-align:right; margin-top:15px;"><button onclick="closeChemModal()" style="background:#27ae60; color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">APPLY</button></div>
</div></div>

<script>
    const users = [
        { id: "admin", pass: "Kp@123", role: "Administrator" },
        { id: "dyehouse", pass: "123", role: "Production" },
        { id: "mis", pass: "123", role: "Production" },
        { id: "sale", pass: "sale@123", role: "Dispatch" }
    ];

    let currentUser = ""; 
    let globalCustomerList = [];
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';

    const CONFIGS = {
        PACKING: { start: 1, end: 1, prefix: "Dye House-", color: "#e67e22" },
        DYING: { machines: ["HTHP-100", "HTHP-450", "HTHP-1000", "HTHP-600", "HTHP-1300", "HTHP-30"], color: "#2c3e50" }, 
        SALE: { start: 1, end: 1, prefix: "Dye House-", color: "#27ae60" }
    };

    const detentionReasons = ["Power Fail","Pressure low","As Per Program", "Labour Short", "No Program", "Machine Cleaning", "Loading Unloading", "Water Loss", "Material Not Ready", "Maintenance", "Mechanical", "Electrical"];
    let activeMcRowId = null;
    let currentChemTarget = ""; // To track if we are filling 'dye' or 'chemical'

    function checkLogin() {
        const u = document.getElementById('userInp').value;
        const p = document.getElementById('passInp').value;
        const found = users.find(x => x.id === u && x.pass === p);
        if (found) {
            currentUser = found.id;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainAppWrapper').style.display = 'block';
            document.getElementById('activeUserInfo').innerText = `LOGGED AS: ${found.id.toUpperCase()}`;
        } else { document.getElementById('loginError').style.display = 'block'; }
    }

    async function handleDeptChange() { renderTable(); }

    function validateDate(selectedDateStr) {
        if (!selectedDateStr) return false;
        const selectedDate = new Date(selectedDateStr); selectedDate.setHours(0,0,0,0);
        const today = new Date(); today.setHours(0,0,0,0);
        const threeDaysAgo = new Date(); threeDaysAgo.setDate(today.getDate() - 3);
        return (selectedDate >= threeDaysAgo && selectedDate <= today);
    }

    function showApp(appId) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('productionApp').style.display = 'block';
        document.getElementById('prodGroup').style.display = "block";
        document.getElementById('saleGroup').style.display = "none";
        document.getElementById('shiftFieldContainer').style.display = "flex";
        renderTable();
    }

    async function showDispatch() {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('productionApp').style.display = 'block';
        document.getElementById('prodGroup').style.display = "none";
        document.getElementById('saleGroup').style.display = "block";
        document.getElementById('shiftFieldContainer').style.display = "none";
        document.getElementById('formType').value = "SALE"; renderTable();
    }

    function goBack() { document.getElementById('productionApp').style.display = 'none'; document.getElementById('dashboard').style.display = 'flex'; }

    function renderTable() {
        const type = document.getElementById('formType').value;
        const config = CONFIGS[type];
        if (!type) { 
            document.getElementById('productionTable').style.display = "none"; 
            document.getElementById('formFooter').style.display = "none";
            return; 
        }
        document.getElementById('productionTable').style.display = "table";
        document.getElementById('formFooter').style.display = "block";
        document.getElementById('welcomeMsg').style.display = "none";
        
        let headerHtml = "";
        if (type === 'SALE') {
            headerHtml = `<th style="background:${config.color}">MC #</th><th style="background:#1565c0">Customer Name</th><th style="background:#1565c0">Invoice Number</th><th style="background:#1565c0">Article</th><th style="background:#1565c0">Order Qnty</th><th style="background:#1565c0">Lot Number</th><th style="background:#c2185b">Prev. Sale</th><th style="background:#27ae60">Net WT</th><th style="background:#27ae60">Gross WT</th><th style="background:#27ae60">Bags</th><th style="background:#27ae60">Cones</th><th style="background:#27ae60">Reff. No.</th><th style="background:#2e7d32">Total Net WT</th><th style="background:#2e7d32">Total Gross WT</th><th style="background:#d35400">Sale Rate</th><th style="background:${config.color}">Remarks</th><th style="background:#2c3e50">Action</th>`;
        } else {
            headerHtml = `<th style="background:${config.color}">MC #</th><th style="background:#1565c0">Article</th><th style="background:#1565c0">Batch Hrs</th><th style="background:#1565c0">Lot Number</th>`;
            if (type === 'PACKING' || type === 'DYING') { headerHtml += `<th style="background:#1565c0">Shade No.</th>`; }
            
            if (type === 'DYING') {
                headerHtml += `<th style="background:#8e44ad">Dye</th><th style="background:#8e44ad">Chemical</th>`;
            }

            headerHtml += `<th style="background:#c2185b">Prev Book</th>`;
            
            if (type === 'PACKING') { headerHtml += `<th style="background: #27ae60;">Net WT</th><th style="background: #27ae60;">Gross WT</th><th style="background: #27ae60;">Box</th><th style="background: #27ae60;">Cone</th><th style="background: #27ae60;">Reff. No.</th><th style="background: #2e7d32;">Total Net WT</th><th style="background: #2e7d32;">Total Gross WT</th>`;
            } else {
                headerHtml += `<th style="background: #27ae60;">Actual KG</th><th style="background: #2e7d32;">Prod (KG)</th>`;
            }

            if (type !== 'PACKING') headerHtml += `<th style="background: #2980b9;">Det. Type</th><th style="background: #2980b9;">Min.</th>`;
            
            headerHtml += `<th style="background:#d35400">Dying Cost</th><th style="background:#d35400">Sale Rate</th><th style="background:${config.color}">Remarks</th><th style="background:#2c3e50">Action</th>`;
        }
        document.getElementById('tableHeaderRow').innerHTML = headerHtml;
        document.getElementById('machineTableBody').innerHTML = "";
        addNewRow(); 
    }

    function addNewRow() {
        const type = document.getElementById('formType').value;
        const config = CONFIGS[type];
        const tbody = document.getElementById('machineTableBody');
        const rowId = "row-" + Date.now();
        
        let mcOptions = `<option value="">-- MC --</option>`;
        if (config.machines) { config.machines.forEach(m => mcOptions += `<option value="${m}">${m}</option>`); } 
        else { mcOptions += `<option value="${config.prefix}1">${config.prefix}1</option>`; }

        const artField = `<input type="text" class="data-article info-box">`;
        let rowHtml = `<tr id="${rowId}"><td><select class="mc-select">${mcOptions}</select></td>`;

        if (type === 'SALE') {
            rowHtml += `<td><input type="text" class="data-cust-name info-box"></td><td><input type="text" class="data-inv-num info-box"></td><td>${artField}</td><td><input type="text" class="data-ord-qnty info-box"></td><td><input type="text" class="data-lot info-box"></td><td><input type="text" class="prev-booked-box" readonly value="0.00"></td><td><input type="number" class="data-net" oninput="calculateRow('${rowId}')"></td><td><input type="number" class="data-gross" oninput="calculateRow('${rowId}')"></td><td><input type="number" class="data-box"></td><td><input type="number" class="data-cone"></td><td><input type="text" class="data-reff"></td><td><input type="text" class="data-prod prod-output" value="0.00" readonly></td><td><input type="text" class="data-total-gross prod-output" value="0.00" readonly></td><td><input type="number" class="data-sale-rate"></td><td><input type="text" class="data-remarks"></td><td><button class="btn-row-submit" onclick="submitSingleMachine('${rowId}')">SAVE</button></td></tr>`;
        } else {
            rowHtml += `<td>${artField}</td><td><input type="text" class="info-box data-ord-qnty"></td><td><input type="text" class="info-box data-lot"></td>`;
            if (type === 'PACKING' || type === 'DYING') { rowHtml += `<td><input type="text" class="info-box data-shade-no"></td>`; }

            if (type === 'DYING') {
                rowHtml += `<td><input type="text" class="info-box data-dye" onclick="openChemModal('${rowId}', 'Dye')" readonly placeholder="Click to Add"></td><td><input type="text" class="info-box data-chemical" onclick="openChemModal('${rowId}', 'Chemical')" readonly placeholder="Click to Add"></td>`;
            }

            rowHtml += `<td><input type="text" class="prev-booked-box" readonly value="0.00"></td>`;
            if (type === 'PACKING') { rowHtml += `<td><input type="number" class="data-net" oninput="calculateRow('${rowId}')"></td><td><input type="number" class="data-gross" oninput="calculateRow('${rowId}')"></td><td><input type="number" class="data-box"></td><td><input type="number" class="data-cone"></td><td><input type="text" class="data-reff"></td><td><input type="text" class="data-prod prod-output" value="0.00" readonly></td><td><input type="text" class="data-total-gross prod-output" value="0.00" readonly></td>`;
            } else { rowHtml += `<td><input type="number" class="data-hank" oninput="calculateRow('${rowId}')"></td><td><input type="text" class="data-prod prod-output" value="0.00" readonly></td>`; }
            
            if (type !== 'PACKING') { rowHtml += `<td><input type="text" class="data-det-type" onclick="openModal('${rowId}')" readonly></td><td><input type="number" class="data-det-min" value="0" readonly></td>`; }
            
            rowHtml += `<td><input type="number" class="data-dying-cost"></td><td><input type="number" class="data-sale-rate"></td><td><input type="text" class="data-remarks"></td><td><button class="btn-row-submit" onclick="submitSingleMachine('${rowId}')">SAVE</button></td></tr>`;
        }
        
        tbody.insertAdjacentHTML('beforeend', rowHtml);
    }

    /* POPUP FUNCTIONS FOR DYE / CHEMICAL */
    function openChemModal(rowId, fieldType) {
        activeMcRowId = rowId;
        currentChemTarget = fieldType;
        document.getElementById('chemModalTitle').innerText = "Add " + fieldType;
        document.getElementById('chemEntriesContainer').innerHTML = "";
        addChemRow(); // Add first row automatically
        document.getElementById('chemModal').style.display = 'block';
    }

    function addChemRow() {
        const container = document.getElementById('chemEntriesContainer');
        const div = document.createElement('div');
        div.className = 'chem-input-row';
        div.innerHTML = `<input type="text" placeholder="Name" class="pop-name"><input type="text" placeholder="KG" class="pop-kg"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; cursor:pointer">X</button>`;
        container.appendChild(div);
    }

    function closeChemModal() {
        const rows = document.querySelectorAll('.chem-input-row');
        let results = [];
        rows.forEach(r => {
            const name = r.querySelector('.pop-name').value;
            const kg = r.querySelector('.pop-kg').value;
            if (name) results.push(`${name}(${kg}kg)`);
        });
        const targetClass = currentChemTarget === 'Dye' ? '.data-dye' : '.data-chemical';
        document.getElementById(activeMcRowId).querySelector(targetClass).value = results.join(", ");
        document.getElementById('chemModal').style.display = 'none';
    }

    function calculateRow(rowId) {
        const row = document.getElementById(rowId);
        const type = document.getElementById('formType').value;
        if (type === 'SALE' || type === 'PACKING') {
            const net = parseFloat(row.querySelector('.data-net').value || 0);
            row.querySelector('.data-prod').value = net.toFixed(2);
        } else {
            const hank = parseFloat(row.querySelector('.data-hank').value || 0);
            row.querySelector('.data-prod').value = hank.toFixed(2);
        }
    }

    function openModal(rowId) {
        activeMcRowId = rowId;
        const container = document.getElementById('detentionOptions');
        container.innerHTML = detentionReasons.map(r => `<div><label>${r}</label><input type="checkbox" id="chk-${r}"></div>`).join('');
        document.getElementById('detentionModal').style.display = 'block';
    }

    function closeModal() {
        const row = document.getElementById(activeMcRowId);
        let selected = [];
        detentionReasons.forEach(r => { if (document.getElementById(`chk-${r}`).checked) selected.push(r); });
        row.querySelector('.data-det-type').value = selected.join(",");
        document.getElementById('detentionModal').style.display = 'none';
    }

    function getValue(row, selector) { const el = row.querySelector(selector); return el ? el.value : ""; }

    async function submitSingleMachine(rowId) {
        const row = document.getElementById(rowId);
        const btn = row.querySelector('.btn-row-submit');
        const dateVal = document.getElementById('batchDate').value;
        const type = document.getElementById('formType').value;
        
        if(!dateVal) return alert("Select Date");
        btn.innerText = "...";
        
        const entry = {
            "Date": dateVal,
            "Department": type,
            "Machine Number": getValue(row, '.mc-select'),
            "Article": getValue(row, '.data-article'),
            "Lot Number": getValue(row, '.data-lot'),
            "Dye": getValue(row, '.data-dye'),
            "Chemical": getValue(row, '.data-chemical'),
            "Actual Production": getValue(row, '.data-prod')
        };

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ data: [entry] }) });
            btn.innerText = "SAVED";
            btn.style.background = "#27ae60";
        } catch(e) { alert("Error saving"); btn.innerText = "SAVE"; }
    }

    async function submitAllData() {
        alert("Submitting all visible rows...");
    }
</script>
</body>
</html>
