<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Professional Theme Variables */
        :root {
            --primary-bg: #f4f7f6;
            --sidebar-bg: #1a252f;
            --accent-orange: #e67e22;
            --text-main: #2c3e50;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        /* Sidebar Style */
        #dashboard { display: flex; height: 100vh; }
        
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h2 { 
            font-size: 1.2rem; 
            letter-spacing: 1px; 
            margin-bottom: 30px; 
            border-left: 4px solid var(--accent-orange);
            padding-left: 10px;
        }

        .nav-btn { 
            background: rgba(255,255,255,0.05); 
            color: #ffffff; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            text-align: left; 
            cursor: pointer; 
            transition: all 0.2s;
            font-family: inherit;
            font-size: 14px;
            text-decoration: none;
            display: block;
        }
        
        .nav-btn:hover { 
            background: var(--accent-orange); 
            color: white; 
            transform: translateX(5px);
            border-color: var(--accent-orange);
        }

        /* Main Content Container */
        .summary-container { 
            flex: 1; 
            padding: 30px 40px; 
            overflow-y: auto; 
        }

        .summary-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .summary-header h1 { margin: 0; font-size: 1.5rem; color: var(--text-main); }

        .date-group { display: flex; gap: 15px; align-items: center; }
        .summary-date-picker { 
            padding: 8px 12px; 
            border-radius: 6px; 
            border: 1px solid #dcdde1; 
            font-family: inherit;
        }

        /* Modern Card Grid */
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; 
        }
        
        .summary-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: var(--shadow);
            border-top: 4px solid var(--accent-orange);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .summary-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .summary-card h3 { 
            margin: 0 0 15px 0; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }
        .summary-card .value { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--text-main); 
        }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { 
            background: #fff; 
            margin: 50px auto; 
            padding: 30px; 
            width: 70%; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }
        
        table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th { background: #f8f9fa; color: #636e72; text-transform: uppercase; font-size: 12px; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f1f2f6; }

        /* PRINT STYLING - FIXING GRAND TOTAL POSITION */
        @media print {
            @page { margin: 1cm; }
            body * { visibility: hidden; }
            #detailModal, #detailModal *, #modalBody, #modalBody * { visibility: visible; }
            #detailModal { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 100% !important; 
                height: auto !important; 
                background: white !important; 
                display: block !important; 
            }
            .modal-content { 
                position: relative !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                width: 100% !important; 
                box-shadow: none !important; 
            }
            table { 
                width: 100% !important; 
                table-layout: fixed; 
                word-wrap: break-word; 
                border: 1px solid #000;
            }
            /* Ensures Footer (Grand Total) only appears at the end of the data */
            tfoot { 
                display: table-row-group !important; 
            }
            tfoot tr {
                page-break-inside: avoid;
            }
            th, td { 
                border: 1px solid #ddd !important; 
                padding: 8px !important; 
                font-size: 12px !important; 
            }
            .sidebar, .print-btn, .close, .nav-btn { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loginOverlay" style="display:none;"></div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <h2 id="modalTitle" style="margin:0; color: #2c3e50;">Department Details</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="print-btn" onclick="window.print()" style="padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">🖨️ Print Report</button>
                <span class="close" onclick="closeModal()" style="font-size: 30px; cursor: pointer; color: #95a5a6;">&times;</span>
            </div>
        </div>
        <div id="modalBody">
            <table id="printableTable">
                <thead>
                    <tr>
                        <th style="width: 70%;">Article / Yarn Description</th>
                        <th style="text-align: right; width: 30%;">Total Production (KG)</th>
                    </tr>
                </thead>
                <tbody id="detailTableBody"></tbody>
                <tfoot>
                    <tr style="background: #fffcf9; font-weight: bold; border-top: 2px solid #000;">
                        <td style="text-align: right;">GRAND TOTAL:</td>
                        <td id="grandTotalKg" style="text-align: right; color: var(--accent-orange); font-size: 1.2rem;">0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<div id="mainAppWrapper">
    <div id="dashboard">
        <div class="sidebar">
            <h2 style="color: white;">CEDAAR ERP</h2>
            <button class="nav-btn" onclick="fetchSummary()">🔄 Refresh Dashboard</button>
            <a href="index.html" class="nav-btn">🏠 Home Page</a>
        </div>

        <div class="summary-container">
            <div class="summary-header">
                <h1>Production Overview</h1>
                <div class="date-group">
                    <label style="font-size: 0.8rem; font-weight: bold; color: #95a5a6;">FROM</label>
                    <input type="date" id="startDate" class="summary-date-picker" onchange="fetchSummary()">
                    <label style="font-size: 0.8rem; font-weight: bold; color: #95a5a6;">TO</label>
                    <input type="date" id="endDate" class="summary-date-picker" onchange="fetchSummary()">
                </div>
            </div>
            
            <div id="summaryLoading" style="display:none; font-weight: 600; color: var(--accent-orange);">⚡ SYNCING DATA...</div>
            
            <div class="summary-grid">
                <div class="summary-card" onclick="showDetails('MIXING')"><h3>Mixing</h3><div class="value" id="sum-MIXING">0.00</div></div>
                <div class="summary-card" onclick="showDetails('CARDING')"><h3>Carding</h3><div class="value" id="sum-CARDING">0.00</div></div>
                <div class="summary-card" onclick="showDetails('DRAWFRAME')"><h3>Drawframe</h3><div class="value" id="sum-DRAWFRAME">0.00</div></div>
                <div class="summary-card" onclick="showDetails('SIMPLEX')"><h3>Simplex</h3><div class="value" id="sum-SIMPLEX">0.00</div></div>
                <div class="summary-card" onclick="showDetails('RING')"><h3>Ring</h3><div class="value" id="sum-RING">0.00</div></div>
                <div class="summary-card" onclick="showDetails('AUTOCONER')"><h3>Autoconer</h3><div class="value" id="sum-AUTOCONER">0.00</div></div>
                <div class="summary-card" onclick="showDetails('TFO')"><h3>TFO</h3><div class="value" id="sum-TFO">0.00</div></div>
                <div class="summary-card" onclick="showDetails('PACKING')"><h3>Packing</h3><div class="value" id="sum-PACKING">0.00</div></div>
                <div class="summary-card" onclick="showDetails('SALE')"><h3>Dispatch</h3><div class="value" id="sum-SALE">0.00</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';
    let rawDataCache = {};

    window.onload = () => {
        const date = new Date();
        date.setDate(date.getDate() - 1); 
        const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        document.getElementById('startDate').value = formattedDate;
        document.getElementById('endDate').value = formattedDate;
        fetchSummary();
    };

    async function fetchSummary() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const loader = document.getElementById('summaryLoading');
        if (!startDate || !endDate) return;
        
        loader.style.display = "block";
        const depts = ['MIXING', 'CARDING', 'DRAWFRAME', 'SIMPLEX', 'RING', 'AUTOCONER', 'TFO', 'PACKING', 'SALE'];
        
        try {
            const promises = depts.map(d => fetch(`${API_URL}?Department=${d}`).then(res => res.json()));
            const results = await Promise.all(promises);

            results.forEach((data, index) => {
                const deptName = depts[index];
                rawDataCache[deptName] = data; 
                let total = 0;

                data.forEach(row => {
                    if (row.Date) {
                        let dObj = new Date(row.Date);
                        let sheetDateStr = `${dObj.getFullYear()}-${("0"+(dObj.getMonth()+1)).slice(-2)}-${("0"+dObj.getDate()).slice(-2)}`;
                        if (sheetDateStr === "NaN-aN-aN") sheetDateStr = String(row.Date).substring(0,10);

                        if (sheetDateStr >= startDate && sheetDateStr <= endDate) {
                            const val = parseFloat(row["Actual Production"] || row["Total Net WT"] || row["Net WT"] || 0);
                            if (!isNaN(val)) total += val;
                        }
                    }
                });
                const displayEl = document.getElementById(`sum-${deptName}`);
                if(displayEl) displayEl.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            });
        } catch (e) { console.error("Fetch Error:", e); }
        loader.style.display = "none";
    }

    function showDetails(dept) {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const data = rawDataCache[dept] || [];
        const tableBody = document.getElementById('detailTableBody');
        const grandTotalEl = document.getElementById('grandTotalKg');
        
        document.getElementById('modalTitle').innerText = `${dept} Details`;
        tableBody.innerHTML = "";
        let groupedData = {};
        let grandTotal = 0;

        data.forEach(row => {
            if (!row.Date) return;
            let dObj = new Date(row.Date);
            let sheetDateStr = `${dObj.getFullYear()}-${("0"+(dObj.getMonth()+1)).slice(-2)}-${("0"+dObj.getDate()).slice(-2)}`;
            if (sheetDateStr >= startDate && sheetDateStr <= endDate) {
                const article = row["Article"] || row["Description"] || row["Yarn Description"] || "Unknown";
                const kg = parseFloat(row["Actual Production"] || row["Total Net WT"] || row["Net WT"] || 0);
                if (!isNaN(kg)) {
                    groupedData[article] = (groupedData[article] || 0) + kg;
                    grandTotal += kg;
                }
            }
        });

        Object.keys(groupedData).forEach(art => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${art}</td><td style="text-align: right; font-weight: bold; color: var(--accent-orange);">${groupedData[art].toFixed(2)}</td>`;
            tableBody.appendChild(tr);
        });
        grandTotalEl.innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('detailModal').style.display = "block";
    }

    function closeModal() { document.getElementById('detailModal').style.display = "none"; }
    window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
</script>
</body>
</html>
