<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDAAR ERP - Production Intelligence</title>
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --main-bg: #f8fafc;
            --accent: #f59e0b; /* Cedaar Orange */
            --text-dark: #0f172a;
            --text-light: #64748b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --card-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--main-bg);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            flex-shrink: 0;
        }

        .brand {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .brand span {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            transition: all 0.2s;
        }

        .nav-item.active {
            background-color: rgba(255,255,255,0.05);
            color: white;
        }

        .nav-item:hover {
            color: white;
            background-color: rgba(255,255,255,0.1);
        }

        /* Main Content */
        .main-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .header-area h2 {
            font-size: 30px;
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
        }

        .header-area p {
            color: var(--text-light);
            margin: 5px 0 0 0;
        }

        /* Filter Section */
        .filter-bar {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            gap: 24px;
            align-items: center;
            margin-bottom: 40px;
            border: 1px solid #e2e8f0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"] {
            border: 1px solid #cbd5e1;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        input[type="date"]:focus {
            border-color: var(--accent);
            ring: 2px solid rgba(245, 158, 11, 0.2);
        }

        /* Report Grid */
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .report-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: left;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .report-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover);
            border-color: var(--accent);
        }

        .report-card .icon-wrap {
            width: 48px;
            height: 48px;
            background: #fff7ed;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 20px;
            transition: background 0.3s;
        }

        .report-card:hover .icon-wrap {
            background: var(--accent);
            color: white;
        }

        .report-card h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .report-card p {
            font-size: 13px;
            color: var(--text-light);
            margin: 8px 0 0 0;
        }

        .download-hint {
            margin-top: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .report-card:hover .download-hint {
            opacity: 1;
            transform: translateX(0);
        }

        .footer-branding {
            margin-top: auto;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        /* Loading Animation */
        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <h1>CEDAAR</h1>
            <span>Textile Limited</span>
        </div>
        
        <a href="#" class="nav-item active">📊 Report Dashboard</a>
        <a href="index.html" class="nav-item">🏠 Return Home</a>

        <div class="footer-branding">
            System Admin: Kulvinder Singh<br>
            v3.0 Enterprise Edition
        </div>
    </aside>

    <main class="main-container">
        <div class="header-area">
            <div>
                <h2>Production Reports</h2>
                <p>Data visualization and export center for all mill departments.</p>
            </div>
        </div>

        <section class="filter-bar">
            <div class="filter-group">
                <label>Date From</label>
                <input type="date" id="reportStartDate">
            </div>
            <div class="filter-group">
                <label>Date To</label>
                <input type="date" id="reportEndDate">
            </div>
            <div style="margin-left: auto; text-align: right;">
                <span style="font-size: 12px; color: var(--text-light); display: block;">File Format</span>
                <span style="font-size: 14px; font-weight: 700; color: var(--text-dark);">CSV Spreadsheet</span>
            </div>
        </section>

        <div class="report-grid" id="reportButtonContainer">
            </div>
    </main>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';
    const departments = ["MIXING", "CARDING", "DRAWFRAME", "SIMPLEX", "RING", "AUTOCONER", "TFO", "PACKING", "SALE"];

    function init() {
        const container = document.getElementById('reportButtonContainer');
        container.innerHTML = departments.map(d => `
            <div class="report-card" onclick="downloadReport('${d}', this)">
                <div class="icon-wrap">📉</div>
                <h3>${d}</h3>
                <p>Extract detailed production and efficiency metrics for ${d}.</p>
                <div class="download-hint">GENERATE EXCEL →</div>
            </div>
        `).join('');
    }

    async function downloadReport(dept, element) {
        const fromDate = document.getElementById('reportStartDate').value;
        const toDate = document.getElementById('reportEndDate').value;

        if(!fromDate || !toDate) {
            alert("Security Check: Please select a valid date range first.");
            return;
        }

        const iconWrap = element.querySelector('.icon-wrap');
        const originalIcon = iconWrap.innerHTML;
        iconWrap.innerHTML = '<div class="loader" style="display:block"></div>';
        element.style.pointerEvents = "none";

        try {
            const response = await fetch(`${API_URL}?Department=${dept}`);
            const data = await response.json();

            if (!data || data.length === 0) {
                alert("No records found in the database for " + dept);
            } else {
                const filtered = data.filter(row => {
                    if (!row["Date"]) return false;
                    const d = new Date(row["Date"]);
                    const rowStr = d.getFullYear() + '-' + 
                                 String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                                 String(d.getDate()).padStart(2, '0');
                    return (rowStr >= fromDate && rowStr <= toDate);
                });

                if (filtered.length === 0) {
                    alert("No data exists for the selected timeframe.");
                } else {
                    const headers = Object.keys(filtered[0]);
                    const csv = [
                        headers.join(","),
                        ...filtered.map(row => headers.map(h => {
                            if (h === "Date" && row[h]) {
                                const d = new Date(row[h]);
                                return `"${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}"`;
                            }
                            return `"${row[h] || ''}"`;
                        }).join(","))
                    ].join("\n");

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `CED_${dept}_REPORT_${fromDate}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
        } catch (e) {
            alert("Connection lost. Please check your network.");
        }

        iconWrap.innerHTML = originalIcon;
        element.style.pointerEvents = "auto";
    }

    init();
</script>
</body>
</html>
