<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #0f0f10; 
            color: #e0e0e0;
        }

        /* Top Navigation */
        nav {
            background-color: #1a1a1c; 
            padding: 15px 30px; 
            text-align: left; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 1px solid #333;
        }
        .nav-link { 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 16px; 
            transition: color 0.3s; 
        }
        .nav-link:hover { color: #e67e22; }

        /* Dashboard Layout */
        #dashboard { 
            display: flex; 
            min-height: calc(100vh - 60px); 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('Gemini_Generated_Image_pvg3hepvg3hepvg3.jpg'); 
            background-size: cover; 
            background-position: center; 
        }

        .sidebar { 
            width: 300px; 
            background: rgba(20, 20, 22, 0.95); 
            padding: 40px 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid #333;
        }

        .company-branding {
            margin-bottom: 40px;
            border-left: 4px solid #e67e22;
            padding-left: 15px;
        }

        .company-name { 
            font-size: 24px; 
            font-weight: 800; 
            color: #fff; 
            margin: 0; 
            letter-spacing: 1px;
        }

        .company-subtitle { 
            color: #e67e22; 
            font-size: 10px; 
            letter-spacing: 2px; 
            font-weight: bold; 
            margin-top: 5px;
        }

        /* Main Content Area */
        .content-area {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
        }

        .section-header {
            margin-bottom: 40px;
        }

        .section-header h2 {
            font-size: 32px;
            font-weight: 300;
            color: #fff;
            margin: 0;
        }

        /* Date Controls Card */
        .controls-card {
            background: #1a1a1c;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 40px;
            border: 1px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .control-group { display: flex; flex-direction: column; }
        .control-group label { 
            font-size: 11px; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        
        input[type="date"] {
            background: #2a2a2d;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        /* Report Grid */
        .report-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }

        .btn-download { 
            background: #212124; 
            color: #fff; 
            border: 1px solid #333; 
            padding: 25px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            text-align: left;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 120px;
        }

        .btn-download:hover { 
            background: #e67e22; 
            border-color: #e67e22;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(230, 126, 34, 0.2);
        }

        .btn-download span.icon { font-size: 24px; margin-bottom: 10px; }
        .btn-download span.label { font-size: 14px; letter-spacing: 0.5px; }

        .footer-info {
            margin-top: auto;
            font-size: 11px;
            color: #555;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-link">Home🏠</a>
</nav>

<div id="dashboard">
    <div class="sidebar">
        <div class="company-branding">
            <h1 class="company-name">CEDAAR</h1>
            <p class="company-subtitle">TEXTILE LIMITED</p>
        </div>
        
        <div style="color: #666; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Analytics Dashboard</div>
        
        <div class="footer-info">
            <strong>System v2.1.0</strong><br>
            Enterprise Resource Planning
        </div>
    </div>

    <div class="content-area">
        <div class="section-header">
            <h2>Production Data Reports</h2>
        </div>

        <div class="controls-card">
            <div class="control-group">
                <label>Date Range From</label>
                <input type="date" id="reportStartDate">
            </div>
            <div class="control-group">
                <label>Date Range To</label>
                <input type="date" id="reportEndDate">
            </div>
            <div style="color: #444; font-size: 12px; margin-left: auto;">
                Select range to enable downloads
            </div>
        </div>

        <div class="report-grid" id="reportButtonContainer">
            </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';
    const departments = ["MIXING", "CARDING", "DRAWFRAME", "SIMPLEX", "RING", "AUTOCONER", "TFO", "PACKING", "SALE"];

    function initDashboard() {
        const container = document.getElementById('reportButtonContainer');
        container.innerHTML = departments.map(d => `
            <button class="btn-download" onclick="downloadData('${d}')">
                <span class="icon">📥</span>
                <span class="label">DOWNLOAD ${d} REPORT</span>
            </button>
        `).join('');
    }

    async function downloadData(dept) {
        const btn = event.currentTarget;
        const originalHtml = btn.innerHTML;
        const fromDate = document.getElementById('reportStartDate').value;
        const toDate = document.getElementById('reportEndDate').value;

        if(!fromDate || !toDate) { 
            alert("Please select both From and To dates"); 
            return; 
        }

        btn.innerHTML = `<span class="icon">⏳</span><span class="label">FETCHING DATA...</span>`;
        btn.disabled = true;

        try {
            const resp = await fetch(`${API_URL}?Department=${dept}`);
            let data = await resp.json();

            if (!data || data.length === 0) { 
                alert("No data available for " + dept); 
            } else {
                let filteredData = data.filter(row => {
                    if (!row["Date"]) return false;
                    let d = new Date(row["Date"]);
                    let rowStr = d.getFullYear() + '-' + 
                                 String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                                 String(d.getDate()).padStart(2, '0');
                    return (rowStr >= fromDate && rowStr <= toDate);
                });

                if (filteredData.length === 0) {
                    alert("No data found for the selected date range.");
                } else {
                    const headers = Object.keys(filteredData[0]);
                    const csv = [
                        headers.join(","),
                        ...filteredData.map(row => headers.map(h => {
                            if (h === "Date" && row[h]) {
                                let d = new Date(row[h]);
                                return `"${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}"`;
                            }
                            return `"${row[h] || ''}"`;
                        }).join(","))
                    ].join("\n");

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${dept}_Report_${fromDate}_to_${toDate}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
        } catch (e) {
            alert("Connection error. Please try again.");
            console.error(e);
        }
        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }

    // Initialize the UI
    initDashboard();
</script>
</body>
</html>
