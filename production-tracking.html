<!DOCTYPE html>
<html>
<head>
    <style>
/* --- STYLES MODIFIED TO SHOW APP BY DEFAULT --- */
        #productionSummaryApp { display: block; padding: 10px; flex: 1; overflow-y: auto; background: #f0f4f8; min-height: 100vh; }
        
        /* Hidden unused apps */
        #saleOrderApp, #fiberIssueApp { display: none; }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); max-width: 100%; margin: 0 auto; }
        h2 { color: #2c3e50; border-left: 5px solid #2196f3; padding-left: 15px; margin-bottom: 10px; font-size: 20px; }
        
        .header-controls { display: flex; gap: 15px; padding: 12px; border-radius: 8px; margin-bottom: 15px; align-items: flex-end; }
        .control-field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; color: #636e72; margin-bottom: 3px; text-transform: uppercase; }
        
        .btn-fetch { background: #1565c0; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; height: 32px; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th { background: #2980b9; color: white; padding: 8px; text-align: center; }
        td { padding: 8px; border: 1px solid #dee2e6; text-align: center; }
        input, select { width: 95%; padding: 6px; border: 1px solid #ced4da; border-radius: 3px; font-size: 12px; }
        
        .btn-row-update { background: #2c3e50; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: bold; }
        
        .so-list-area { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .so-table th { background: #2c3e50; }

        .nav-link { 
          color: #ffffff; 
          text-decoration: none; 
          margin: 0 15px; 
          font-weight: 500; 
          font-size: 16px;
          transition: color 0.3s;
        }
        .nav-link:hover { color: #e67e22; text-decoration: underline; }
    </style>
</head>
<body onload="loadProductionSummary()"> <nav style="background-color: #000000; padding: 15px 0; text-align: left; font-family: 'Segoe UI', Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
  <a href="index.html" class="nav-link">Return Home🏠</a>
  <span style="color: white; margin-left: 20px; font-weight: bold;"></span>
</nav>

<div id="productionSummaryApp">
    <div class="container">
        <h2>Production Summary Track</h2>
        <div class="header-controls" style="background:#e8f5e9; border: 1px solid #4caf50;">
            <div class="control-field">
                <label>Filter Summary by PO / Article / Party / Status</label>
                <input type="text" id="prodSearchInput" placeholder="Type to filter..." onkeyup="filterProductionTable()" style="width:250px;">
            </div>
            <button class="btn-fetch" onclick="loadProductionSummary()" style="background:#4caf50">🔄 REFRESH DATA</button>
        </div>
        <div class="so-list-area">
            <div style="overflow-x: auto;">
                <table class="so-table" id="productionTable">
                    <thead>
                        <tr style="background: #2e7d32;">
                            <th>PO ID</th>
                            <th>Status</th>
                            <th>Party Name</th>
                            <th>Article</th>
                            <th>Lot No</th>
                            <th>Order Qnty</th>
                            <th>Mixing</th>
                            <th>Carding</th>
                            <th>Drawframe</th>
                            <th>Simplex</th>
                            <th>Ring</th>
                            <th>Autoconer</th>
                            <th>TFO</th>
                            <th>Packing</th>
                            <th>Sale</th>
                            <th style="background:#d35400;">Recovery %</th>
                        </tr>
                    </thead>
                    <tbody id="prodSummaryBody">
                        <tr><td colspan="16">Fetching departmental data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbybNtCkYArFfsMpSlkN4WrpXAsohYbiqfI6P4wn7b_Elsqn9uE5uIP89VyZlSdm7bbbHw/exec';

    // --- DATA LOADING LOGIC ---
    async function loadProductionSummary() {
        const tbody = document.getElementById('prodSummaryBody');
        tbody.innerHTML = "<tr><td colspan='16'>Calculating totals from departments...</td></tr>";
        
        try {
            const depts = ["SALE_ORDER", "MIXING", "CARDING", "DRAWFRAME", "SIMPLEX", "RING", "AUTOCONER", "TFO", "PACKING", "SALE"];
            
            const results = await Promise.all(depts.map(dept => 
                fetch(`${API_URL}?Department=${dept}`).then(res => res.json())
            ));

            const deptData = {};
            depts.forEach((name, index) => {
                deptData[name] = results[index];
            });

            const orders = deptData["SALE_ORDER"];
            
            if(!orders || orders.length === 0) {
                tbody.innerHTML = "<tr><td colspan='16'>No active orders found.</td></tr>";
                return;
            }

            tbody.innerHTML = "";
            orders.reverse().forEach(order => {
                const poId = String(order["PO ID"]);
                const status = order["Status"] || 'Pending';
                const party = order["Party Name"] || 'N/A';
                
                const getSum = (deptName) => {
                    const header = ["PACKING", "SALE"].includes(deptName) ? "Total Net WT" : "Actual Production";
                    return (deptData[deptName] || [])
                        .filter(row => String(row["PO ID"]) === poId)
                        .reduce((sum, row) => sum + (parseFloat(row[header]) || 0), 0);
                };

                const mixVal = getSum("MIXING");
                const packVal = getSum("PACKING");
                const recVal = mixVal > 0 ? ((packVal / mixVal) * 100).toFixed(2) : "0.00";

                tbody.innerHTML += `<tr>
                    <td style="font-weight:bold">${poId}</td>
                    <td style="color:${status === 'Closed' || status === 'CLOSE' ? '#c0392b' : '#27ae60'}; font-weight:bold">${status}</td>
                    <td>${party}</td>
                    <td>${order["Article"] || ''}</td>
                    <td>${order["Lot Number"] || ''}</td>
                    <td style="font-weight:bold">${order["Order Qnty"] || 0}</td>
                    <td>${mixVal.toFixed(2)}</td>
                    <td>${getSum("CARDING").toFixed(2)}</td>
                    <td>${getSum("DRAWFRAME").toFixed(2)}</td>
                    <td>${getSum("SIMPLEX").toFixed(2)}</td>
                    <td>${getSum("RING").toFixed(2)}</td>
                    <td>${getSum("AUTOCONER").toFixed(2)}</td>
                    <td>${getSum("TFO").toFixed(2)}</td>
                    <td>${packVal.toFixed(2)}</td>
                    <td style="background:#e3f2fd; font-weight:bold">${getSum("SALE").toFixed(2)}</td>
                    <td style="background:#fff3e0; font-weight:bold; color:#e67e22;">${recVal}%</td>
                </tr>`;
            });
        } catch (e) { 
            console.error(e);
            tbody.innerHTML = "<tr><td colspan='16'>Error loading departmental data.</td></tr>"; 
        }
    }

    function filterProductionTable() {
        const input = document.getElementById("prodSearchInput").value.trim().toUpperCase();
        const tr = document.getElementById("prodSummaryBody").getElementsByTagName("tr");
        
        for (let i = 0; i < tr.length; i++) {
            const cells = tr[i].getElementsByTagName("td");
            if (cells.length < 2) continue;

            const statusText = cells[1].textContent.trim().toUpperCase(); 
            const rowText = tr[i].textContent.toUpperCase();

            if (input === "CLOSE" || input === "PENDING" || input === "TO CLOSE") {
                tr[i].style.display = (statusText === input) ? "" : "none";
            } else {
                tr[i].style.display = rowText.includes(input) ? "" : "none";
            }
        }
    }
</script>
</body>
</html>
